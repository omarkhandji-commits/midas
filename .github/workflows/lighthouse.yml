name: Lighthouse

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_KEYRING_BACKEND: keyring.backends.null.Keyring

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  audit:
    name: Lighthouse · perf / a11y / best-practices / seo
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python (for dashboard server)
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web,multimodal]"

      - name: Build SPA
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build

      - name: Install Lighthouse CI
        run: npm install -g @lhci/cli@0.13.x

      - name: Start demo dashboard
        run: |
          MIDAS_DEMO=1 python -m midas.flagship.dashboard &
          echo "DASH_PID=$!" >> $GITHUB_ENV
          for i in {1..30}; do
            curl -sf http://127.0.0.1:8765/login > /dev/null && break
            sleep 1
          done

      - name: Run Lighthouse
        run: |
          lhci autorun \
            --collect.url=http://127.0.0.1:8765/login \
            --collect.numberOfRuns=1 \
            --upload.target=temporary-public-storage \
            --assert.preset=lighthouse:no-pwa \
            --assert.assertions.categories:performance=warn \
            --assert.assertions.categories:accessibility=warn \
            --assert.assertions.categories:best-practices=warn \
            --assert.assertions.categories:seo=warn || true

      - name: Stop dashboard
        if: always()
        run: kill $DASH_PID || true
