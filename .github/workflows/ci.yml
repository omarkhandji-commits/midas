name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · types · architecture · security
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Mypy (types)
        run: mypy src
      - name: Import contract (core must not import flagship)
        run: lint-imports
      - name: Bandit (security, medium+)
        run: bandit -r src -ll

  test:
    name: Tests · transparency eval (py${{ matrix.python }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,web]"
      - name: Tests
        run: python -m pytest -q -p no:cacheprovider
      - name: Transparency eval (deterministic, offline)
        run: midas eval

  web:
    name: Web · typecheck · lint · vitest · build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Install
        run: npm ci --no-audit --no-fund
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Tests (vitest)
        run: npm test
      - name: Build (assets → dashboard/static/app)
        run: npm run build

  build:
    name: Build · validate package
    needs: web
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - name: Build SPA assets (ship them in the wheel)
        working-directory: web
        run: |
          npm ci --no-audit --no-fund
          npm run build
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build twine
          python -m build
      - name: Validate package metadata
        run: twine check dist/*
